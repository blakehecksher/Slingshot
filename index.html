<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slingshot</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
      body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #d8d2c2; }
      #app { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; top: 8px; left: 8px;
        font-size: 12px; line-height: 1.4;
        color: #d8d2c2; opacity: 0.85;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        white-space: pre;
      }
      #controls {
        position: fixed;
        top: 8px;
        right: 8px;
        max-width: 300px;
        font-size: 11px;
        line-height: 1.5;
        color: #d8d2c2;
        background: rgba(8, 10, 16, 0.55);
        border: 1px solid rgba(184, 115, 51, 0.35);
        padding: 8px 12px;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
      #controls h3 {
        margin: 0 0 6px 0;
        font-size: 12px;
        color: #eae0c8;
        letter-spacing: 0.05em;
      }
      #controls .row { white-space: nowrap; }
      #controls b { color: #eae0c8; }
      #pad-debug {
        position: fixed;
        bottom: 8px;
        left: 8px;
        max-width: 720px;
        font-size: 11px;
        line-height: 1.45;
        color: #d8d2c2;
        background: rgba(8, 10, 16, 0.6);
        border: 1px solid rgba(184, 115, 51, 0.35);
        padding: 8px 12px;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #pad-debug b { color: #eae0c8; }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud"></div>
    <div id="controls"></div>
    <div id="pad-debug"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
